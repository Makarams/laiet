<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="glow" cx="50%" cy="52%" r="48%">
      <stop offset="0%" stop-color="#8af0ff" stop-opacity="0.22"/>
      <stop offset="70%" stop-color="#5ec8e0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#04040e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="seg" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#2a5a8a"/>
      <stop offset="100%" stop-color="#0e2040"/>
    </linearGradient>
    <linearGradient id="seg2" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#224f7a"/>
      <stop offset="100%" stop-color="#0a1a30"/>
    </linearGradient>
  </defs>

  <!-- Deep void background -->
  <rect width="32" height="32" fill="#04040e" rx="4.5"/>

  <!-- Bioluminescent specimen glow -->
  <ellipse cx="16" cy="17" rx="13" ry="13" fill="url(#glow)"/>

  <!-- Antennae -->
  <line x1="14.2" y1="7.8" x2="10.5" y2="3.2" stroke="#5ec8e0" stroke-width="1.1" stroke-linecap="round" opacity="0.9"/>
  <line x1="17.8" y1="7.8" x2="21.5" y2="3.2" stroke="#5ec8e0" stroke-width="1.1" stroke-linecap="round" opacity="0.9"/>
  <!-- Antenna bulb tips -->
  <circle cx="10.5" cy="3.2" r="1.3" fill="#8af0ff" opacity="0.95"/>
  <circle cx="21.5" cy="3.2" r="1.3" fill="#8af0ff" opacity="0.95"/>

  <!-- Head -->
  <ellipse cx="16" cy="10.2" rx="4.2" ry="3.1" fill="url(#seg)" stroke="#5ec8e0" stroke-width="0.9"/>

  <!-- Eyes — phosphor cream with dark pupils -->
  <circle cx="14.0" cy="9.7" r="1.3" fill="#c0e8f8" opacity="0.95"/>
  <circle cx="18.0" cy="9.7" r="1.3" fill="#c0e8f8" opacity="0.95"/>
  <circle cx="14.0" cy="9.7" r="0.6" fill="#04040e"/>
  <circle cx="18.0" cy="9.7" r="0.6" fill="#04040e"/>
  <!-- Eye specular -->
  <circle cx="13.6" cy="9.3" r="0.3" fill="#ffffff" opacity="0.6"/>
  <circle cx="17.6" cy="9.3" r="0.3" fill="#ffffff" opacity="0.6"/>

  <!-- Thorax (widest) -->
  <ellipse cx="16" cy="17.2" rx="5.2" ry="4.0" fill="url(#seg)" stroke="#5ec8e0" stroke-width="0.9"/>
  <!-- Thorax dorsal groove -->
  <line x1="16" y1="13.4" x2="16" y2="21.0" stroke="#8af0ff" stroke-width="0.5" opacity="0.25"/>

  <!-- Legs — 3 pairs radiating from thorax -->
  <!-- Front pair -->
  <line x1="11.0" y1="14.8" x2="6.5" y2="12.5" stroke="#5ec8e0" stroke-width="1.05" stroke-linecap="round" opacity="0.85"/>
  <line x1="21.0" y1="14.8" x2="25.5" y2="12.5" stroke="#5ec8e0" stroke-width="1.05" stroke-linecap="round" opacity="0.85"/>
  <!-- Middle pair -->
  <line x1="10.8" y1="17.2" x2="6.0" y2="17.2" stroke="#5ec8e0" stroke-width="1.05" stroke-linecap="round" opacity="0.85"/>
  <line x1="21.2" y1="17.2" x2="26.0" y2="17.2" stroke="#5ec8e0" stroke-width="1.05" stroke-linecap="round" opacity="0.85"/>
  <!-- Rear pair -->
  <line x1="11.0" y1="19.6" x2="6.5" y2="22.5" stroke="#5ec8e0" stroke-width="1.05" stroke-linecap="round" opacity="0.85"/>
  <line x1="21.0" y1="19.6" x2="25.5" y2="22.5" stroke="#5ec8e0" stroke-width="1.05" stroke-linecap="round" opacity="0.85"/>

  <!-- Abdomen — tapered, segmented -->
  <ellipse cx="16" cy="25.5" rx="3.4" ry="4.2" fill="url(#seg2)" stroke="#5ec8e0" stroke-width="0.8"/>
  <!-- Abdomen segment lines -->
  <line x1="13.0" y1="24.0" x2="19.0" y2="24.0" stroke="#5ec8e0" stroke-width="0.55" opacity="0.45"/>
  <line x1="12.8" y1="26.5" x2="19.2" y2="26.5" stroke="#5ec8e0" stroke-width="0.55" opacity="0.45"/>

  <!-- Central dorsal shimmer — unifying the three segments -->
  <line x1="16" y1="7.1" x2="16" y2="29.5" stroke="#8af0ff" stroke-width="0.4" opacity="0.15"/>
</svg>
