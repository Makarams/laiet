<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="wispGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#a0f0ff" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#5ec8e0" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#04040e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wispBody" x1="0" y1="0.2" x2="0" y2="0.95">
      <stop offset="0%" stop-color="#6db8d8"/>
      <stop offset="100%" stop-color="#2a7a98"/>
    </linearGradient>
  </defs>

  <!-- Deep void background -->
  <rect width="32" height="32" fill="#04040e" rx="4.5"/>

  <!-- Bioluminescent aura -->
  <ellipse cx="16" cy="14" rx="11" ry="12" fill="url(#wispGlow)"/>

  <!-- Wisp body — tall ellipse -->
  <ellipse cx="16" cy="13.5" rx="5.2" ry="9.5" fill="url(#wispBody)" opacity="0.92"/>

  <!-- Primary tail — flowing bezier curve -->
  <path d="M 15.2 21.8 Q 13.8 24.2 14.5 28"
        stroke="#5ec8e0" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.85"/>

  <!-- Secondary fraying strand -->
  <path d="M 16.8 21.5 Q 17.8 24.0 17.2 27.5"
        stroke="#5ec8e0" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.58"/>

  <!-- Tertiary filament — very delicate -->
  <path d="M 15.8 22.0 Q 15.0 24.5 15.8 28.2"
        stroke="#5ec8e0" stroke-width="0.9" fill="none" stroke-linecap="round" opacity="0.40"/>

  <!-- Lateral fin accent (left) — translucent wing-like -->
  <path d="M 10.8 13 Q 8.8 13.5 8.5 16 L 11.2 15"
        fill="#6db8d8" opacity="0.35" stroke="none"/>

  <!-- Lateral fin accent (right) — translucent wing-like -->
  <path d="M 21.2 13 Q 23.2 13.5 23.5 16 L 20.8 15"
        fill="#6db8d8" opacity="0.35" stroke="none"/>

  <!-- Top highlight — ethereal glow point -->
  <circle cx="16" cy="5" r="1.8" fill="#a0f0ff" opacity="0.70"/>

  <!-- Central dorsal shimmer line — unifying glow -->
  <line x1="16" y1="4.5" x2="16" y2="28.5" stroke="#8af0ff" stroke-width="0.6" opacity="0.18"/>
</svg>
